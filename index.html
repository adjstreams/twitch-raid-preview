<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Raid Preview</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:transparent;
font-family:Arial, Helvetica, sans-serif;
}

#stage{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

/* preview container */

#preview-shell{

position:absolute;

right:40px;
bottom:40px;

width:640px;
height:360px;

transform-origin:bottom right;
transform:scale(0.05);

transition:transform .35s cubic-bezier(.34,1.56,.64,1);

pointer-events:none;

}

/* video frame */

#preview{

position:absolute;
inset:0;

border-radius:18px;
overflow:hidden;

background:black;

box-shadow:0 30px 80px rgba(0,0,0,.6);

transition:border-radius .6s ease;

}

#player{
width:100%;
height:100%;
}

/* raid banner */

#raid-banner{

position:absolute;

left:20px;
bottom:20px;

padding:10px 16px;

background:rgba(0,0,0,.65);
color:white;

font-size:22px;
font-weight:600;

border-radius:8px;

pointer-events:none;

z-index:10;

}

</style>

<script src="https://player.twitch.tv/js/embed/v1.js"></script>

</head>
<body>

<div id="stage">

<div id="preview-shell">

<div id="preview">
<div id="player"></div>
</div>

</div>

</div>

<script>

const params=new URLSearchParams(window.location.search)

const channel=params.get("channel") || "adjstreams"
const delay=parseFloat(params.get("delay") || "69")
const duration=parseFloat(params.get("duration") || "10")
const spawnDelay=parseFloat(params.get("spawnDelay") || "1")
const parentParam = params.get("parent")
const shell=document.getElementById("preview-shell")
const preview=document.getElementById("preview")
const parent = parentParam
  ? parentParam.split(",")
  : [location.hostname]


/* Twitch player */

const player=new Twitch.Player("player",{

channel:channel,
width:"100%",
height:"100%",
parent:parent,
muted:true

})

player.addEventListener(Twitch.Player.READY,()=>{

player.play()

setTimeout(()=>{
try{
player.setMuted(false)
}catch(e){}
},800)

/* add raid banner AFTER playback begins */

const spawnAnimationTime = 350

setTimeout(()=>{

    const banner=document.createElement("div")

    banner.id="raid-banner"

    banner.innerHTML=`Raiding <span>${channel}</span>`

    preview.appendChild(banner)

    }, (spawnDelay*1000) + spawnAnimationTime + 300)

})

/* spawn animation */

setTimeout(()=>{

requestAnimationFrame(()=>{
shell.style.transform="scale(1)"
})

},spawnDelay*1000)

/* fullscreen animation */

setTimeout(()=>{

const rect=shell.getBoundingClientRect()

const scaleX=window.innerWidth/rect.width
const scaleY=window.innerHeight/rect.height

const scale=Math.max(scaleX,scaleY)

shell.style.transition=`
transform ${duration}s cubic-bezier(.22,1.15,.36,1),
right ${duration}s cubic-bezier(.22,1.15,.36,1),
bottom ${duration}s cubic-bezier(.22,1.15,.36,1)
`

shell.style.right="50%"
shell.style.bottom="50%"
shell.style.transformOrigin="center"

shell.style.transform=`translate(50%,50%) scale(${scale})`

preview.style.borderRadius="0px"

},delay*1000)

</script>

</body>
</html>
